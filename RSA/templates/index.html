<!DOCTYPE html>
<html>
<head>

<title>RSA Algorithm Demo</title>

<style>

body{
font-family: Arial;
background:#f0f4ff;
text-align:center;
}

.container{
background:white;
width:500px;
margin:auto;
margin-top:40px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
padding:8px;
margin:5px;
width:200px;
}

button{
padding:10px;
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
}

.result{
background:#111;
color:#00ff9c;
padding:15px;
margin-top:20px;
text-align:left;
font-family:monospace;
}

</style>

</head>

<body>

<div class="container">

<h2>RSA Encryption Demo</h2>

<form method="POST" action="/calculate">

<p>Prime Number p</p>
<input type="number" name="p" required>

<p>Prime Number q</p>
<input type="number" name="q" required>

<p>Message (number)</p>
<input type="number" name="message" required>

<br><br>

<button type="submit">Run RSA</button>

</form>

{% if steps %}

<div class="result">

{% for step in steps %}
{{step}}<br>
{% endfor %}

</div>

{% endif %}

</div>

</body>
</html>
