<!DOCTYPE html>
<html>
<head>

<title>S-DES Encryption</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
width:600px;
margin:auto;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px;
background:blue;
color:white;
border:none;
}

pre{
background:black;
color:#00ff00;
padding:15px;
}

.error{
color:red;
}

</style>

</head>

<body>

<div class="container">

<h2>S-DES Encryption Simulator</h2>

<form method="POST">

<label>Plaintext (8 bits)</label>
<input type="text" name="plaintext" placeholder="Example: 10101010" required>

<label>Key (10 bits)</label>
<input type="text" name="key" placeholder="Example: 1010000010" required>

<button type="submit">Encrypt</button>

</form>

{% if error %}
<p class="error">{{error}}</p>
{% endif %}

{% if steps %}

<h3>Steps</h3>

<pre>
{% for step in steps %}
{{step}}
{% endfor %}
</pre>

{% endif %}

</div>

</body>
</html>
