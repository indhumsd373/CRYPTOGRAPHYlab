<!DOCTYPE html>
<html>
<head>
    <title>MD5 Hash Explorer</title>
    <style>
        body { font-family: 'Consolas', monospace; background: #0f172a; color: #e2e8f0; padding: 40px; }
        .container { max-width: 850px; margin: auto; background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid #334155; }
        input { width: 100%; padding: 12px; margin: 15px 0; background: #0f172a; border: 1px solid #475569; color: #38bdf8; font-size: 16px; border-radius: 6px; }
        button { width: 100%; padding: 15px; background: #38bdf8; border: none; color: #0f172a; cursor: pointer; font-weight: bold; border-radius: 6px; }
        #log-area { margin-top: 30px; }
        .step { background: #334155; padding: 12px; margin: 8px 0; border-radius: 4px; font-size: 14px; border-left: 4px solid #38bdf8; }
        .hash-box { background: #0f172a; padding: 20px; border: 1px dashed #38bdf8; color: #38bdf8; font-size: 24px; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔬 MD5 Message-Digest Explorer</h2>
        <p>MD5 processes data in 512-bit blocks and produces a 128-bit fingerprint.</p>
        
        <label>Input Message:</label>
        <input type="text" id="msg" value="The quick brown fox">
        
        <button onclick="compute()">Compute MD5 Hash</button>
        
        <div id="log-area">
            <div id="final-hash" class="hash-box" style="display:none;"></div>
            <div id="steps-list"></div>
        </div>
    </div>

    <script>
        async function compute() {
            const msg = document.getElementById('msg').value;
            const res = await fetch('/calculate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({msg})
            });
            const data = await res.json();
            
            const hashDiv = document.getElementById('final-hash');
            hashDiv.style.display = "block";
            hashDiv.innerHTML = "MD5 Hash: <br>" + data.hash;
            
            const list = document.getElementById('steps-list');
            list.innerHTML = "<h3>Intermediate Processing:</h3>";
            data.steps.forEach(step => {
                const div = document.createElement('div');
                div.className = 'step';
                div.innerText = step;
                list.appendChild(div);
            });
        }
    </script>
</body>
</html>
