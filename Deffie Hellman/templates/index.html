<!DOCTYPE html>
<html>
<head>

<title>Diffie-Hellman Key Exchange Demo</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background: linear-gradient(135deg,#4facfe,#00f2fe);
font-family: Arial;
}

.card{
margin-top:40px;
border-radius:15px;
}

.result-box{
background:#111;
color:#00ff90;
padding:20px;
border-radius:10px;
font-family:monospace;
}

</style>

</head>

<body>

<div class="container">

<div class="card shadow-lg">

<div class="card-body">

<h2 class="text-center text-primary">
Diffie-Hellman Key Exchange
</h2>

<p class="text-center">
Secure key exchange using modular exponentiation
</p>

<form method="POST" action="/calculate">

<div class="row">

<div class="col-md-6">
<label>Prime Number (p)</label>
<input type="number" name="p" class="form-control" required>
</div>

<div class="col-md-6">
<label>Generator (g)</label>
<input type="number" name="g" class="form-control" required>
</div>

</div>

<br>

<div class="row">

<div class="col-md-6">
<label>Alice Private Key (a)</label>
<input type="number" name="a" class="form-control" required>
</div>

<div class="col-md-6">
<label>Bob Private Key (b)</label>
<input type="number" name="b" class="form-control" required>
</div>

</div>

<br>

<div class="text-center">
<button class="btn btn-primary btn-lg">
Run Diffie-Hellman
</button>
</div>

</form>

{% if steps %}

<hr>

<h4 class="text-center">Intermediate Steps</h4>

<div class="result-box">

{% for step in steps %}
{{ step }}<br>
{% endfor %}

</div>

{% endif %}

</div>
</div>

</div>

</body>
</html>
